<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Farm</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body {
            line-height: 1;
            background-color: black;
        }

        ol,
        ul {
            list-style: none;
        }

        img,
        video {
            max-width: 100%;
            height: auto;
            display: block;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        #game-container {
            max-height: 1000px;
            max-width: 1000px;
        }

    </style>
</head>

<body>
    <div id="game-container"></div>
    <script src="./phaser.js"></script>
    <script type="module" src="./src/main.js"></script>
</body>

</html>
